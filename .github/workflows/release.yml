name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install pnpm
        run: npm install --global pnpm@11.7.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Validate release metadata and installer
        run: |
          node -e "const p=require('./package.json'); if ('v'+p.version !== process.env.GITHUB_REF_NAME) process.exit(1)"
          sh -n install.sh
      - name: Pack
        run: |
          mkdir release
          pnpm pack --pack-destination release
          cd release
          sha256sum *.tgz > "$(find . -name '*.tgz' -printf '%f').sha256"
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" --title "Alexus CLI $GITHUB_REF_NAME" --generate-notes --latest
          gh release upload "$GITHUB_REF_NAME" release/* --clobber
